name: yalla_home
description: "Yalla Home delivery app."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  iconsax: ^0.0.8
  connectivity_plus: ^7.2.0
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  web: ^1.1.1
  firebase_core: ^4.12.0
  # 5.2.5 has the same FirebasePlugin compatibility regression as messaging
  # 16.4.2 when used with firebase_core_platform_interface 7.1.0.
  firebase_crashlytics: 5.2.4
  # 16.4.2 references the removed FirebasePlugin type and does not compile
  # with firebase_core_platform_interface 7.1.0. Keep the compatible release.
  firebase_messaging: 16.4.1
  flutter_local_notifications: ^22.0.1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  fake_async: ^1.3.3

flutter:

  uses-material-design: true

  assets:
    - assets/logos/yallahome_logo.webp
    - assets/images/placeholders/default_courier.webp
    - assets/images/placeholders/default_product.webp
    - assets/images/placeholders/default_user_avatar.webp

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
