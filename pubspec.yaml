name: yalla_home
description: "Yalla Home delivery app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  iconsax: ^0.0.8
  connectivity_plus: ^7.0.0
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/logos/
    - assets/fonts/
    - assets/images/placeholders/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
